name: validate-playbook

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-validation:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate scripts, required files, and secrets
        shell: pwsh
        run: ./scripts/validate-repo.ps1
